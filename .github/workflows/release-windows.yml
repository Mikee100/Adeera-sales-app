name: Release Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Align app version with tag
        shell: pwsh
        run: |
          $version = "${env:RELEASE_TAG}".TrimStart('v')
          $currentVersion = node -p "require('./package.json').version"

          if ($currentVersion -eq $version) {
            Write-Host "package.json already at version $version, skipping npm version"
          } else {
            npm version $version --no-git-tag-version
          }

      - name: Build Windows installer
        run: npm run package:win

      - name: Verify release files
        shell: pwsh
        run: |
          if (-not (Test-Path "release/latest.yml")) { throw "Missing release/latest.yml" }
          if (-not (Get-ChildItem "release/*.exe" -ErrorAction SilentlyContinue)) { throw "Missing release exe" }
          if (-not (Get-ChildItem "release/*.blockmap" -ErrorAction SilentlyContinue)) { throw "Missing release blockmap" }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: SaaS POS ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
